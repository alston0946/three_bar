name: three-bar-play-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"   # 周一到周五，北京/东京 16:30

permissions:
  contents: read

concurrency:
  group: three-bar-play-scan
  cancel-in-progress: false

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      START_DATE: "20250101"
      MAX_WORKERS: "1"
      SLEEP_SEC: "0.10"
      # TARGET_DATES 留空时，脚本默认取北京时间今天
      TARGET_DATES: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directory
        run: mkdir -p output

      - name: Run scanner
        run: python three_bar_play_multi_dates.py

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-bar-play-output
          path: output/*.csv
          if-no-files-found: warn
