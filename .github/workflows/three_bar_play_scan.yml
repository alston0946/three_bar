name: three-bar-play-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"   # 北京时间/东京时间 16:30，周一到周五

permissions:
  contents: read

concurrency:
  group: three-bar-play-scan
  cancel-in-progress: false

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      START_DATE: "20250101"
      MAX_WORKERS: "1"
      SLEEP_SEC: "0.10"
      BATCH_START: "0"
      BATCH_SIZE: "10000"
      # 留空时，脚本会自动使用北京时间今天作为 TARGET_DATES
      TARGET_DATES: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Check repository files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository files:"
          ls -R

      - name: Check required data files
        run: |
          test -f data/a_share_codes_for_akshare.csv || (echo "Missing data/a_share_codes_for_akshare.csv" && exit 1)
          test -f data/a_share_below_8b.csv || (echo "Missing data/a_share_below_8b.csv" && exit 1)
          test -f data/st_stocks.csv || (echo "Missing data/st_stocks.csv" && exit 1)
          test -f three_bar_play_multi_dates.py || (echo "Missing three_bar_play_multi_dates.py" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output directory
        run: mkdir -p output

      - name: Run scanner
        run: python three_bar_play_multi_dates.py

      - name: Show output files
        if: always()
        run: |
          echo "Output directory:"
          ls -lah output || true

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-bar-play-output
          path: output/*.csv
          if-no-files-found: warn
